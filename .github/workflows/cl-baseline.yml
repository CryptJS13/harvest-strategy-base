name: CL Baseline Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  cl-baseline:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      ALCHEMEY_KEY: ${{ secrets.ALCHEMEY_KEY }}
      MNEMONIC: ${{ secrets.MNEMONIC }}
      FORK_BLOCK: "32897925"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CL baseline gate
        run: |
          set -o pipefail
          npm run gate:cl 2>&1 | tee cl-gate.log

      - name: Upload CL gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cl-gate-artifacts
          path: |
            cl-gate.log
            scripts/config/*.json
            scripts/deployments/cl/*.json
          if-no-files-found: ignore
